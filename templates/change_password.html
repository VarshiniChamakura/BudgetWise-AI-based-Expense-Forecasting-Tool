<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page">
    <div class="project-title">
        BudgetWise AI-based Expense Forecasting Tool
    </div>

    <div class="center-area">
        <div class="login-box">

            <div class="back-link">
                <a href="{{ url_for('home') }}">← Back</a>
            </div>

            <h2>Change Password</h2>

            <form id="changeForm">

                <div class="field-label">Email <span>*</span></div>
                <input type="email" name="email" required>

                <div class="field-label">New Password <span>*</span></div>
                <input type="password" id="newPassword" name="newPassword" required maxlength="10">

                <div class="rule">
                    <span id="len">8–10 characters</span>,
                    <span id="digit">1 digit</span>,
                    <span id="special">1 special character</span>
                </div>

                <div class="field-label">Confirm Password <span>*</span></div>
                <input type="password" id="confirmNewPassword" required maxlength="10">

                <button type="submit" class="blue-btn">Change Password</button>
            </form>

        </div>
    </div>
</div>

<script>

function checkPassword(){
    const pwd=document.getElementById("newPassword").value;
    document.getElementById("len").classList.toggle("valid", pwd.length>=8 && pwd.length<=10);
    document.getElementById("digit").classList.toggle("valid", /\d/.test(pwd));
    document.getElementById("special").classList.toggle("valid", /[!@#$%^&*]/.test(pwd));
}

document.getElementById("newPassword").addEventListener("keyup", checkPassword);

document.getElementById("changeForm").onsubmit=function(e){
    e.preventDefault();

    const pwd=document.getElementById("newPassword").value;
    const cpwd=document.getElementById("confirmNewPassword").value;

    if(pwd!==cpwd){
        alert("Passwords do not match");
        return;
    }

    fetch("/change_password",{
        method:"POST",
        body:new FormData(this)
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status==="error"){
            alert(data.message);
        }else{
            alert("Password Updated!");
            this.reset();
            window.location.href="/";
        }
    });
};

</script>

</body>
</html>
