{% extends "base.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='monthly_budget.css') }}">

<div class="page-wrapper">

    <div class="form-card">

        <h2>
            <i class="fa-solid fa-coins"></i>
            Set Monthly Budget
        </h2>

        <form method="POST" action="/monthly-budget">

            <div class="form-group">
                <label>Month & Year</label>
                <input type="month" name="month" required>
            </div>

            <div class="form-group">
                <label>Budget Amount (₹)</label>
                <input type="number" name="amount" placeholder="Enter monthly budget" required>
            </div>

            <button type="submit" class="primary-btn">
                <i class="fa-solid fa-check-circle"></i> Save Budget
            </button>

        </form>

    </div>

</div>

{% endblock %}
