{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='recent_expenses.css') }}">

<div class="expense-table-container">

    <h2>Recent Expenses</h2>

    <table class="expense-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount (₹)</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for exp in expenses %}
            <tr>
                <td>{{ exp.date }}</td>
                <td>{{ exp.category }}</td>
                <td>{{ exp.description }}</td>
                <td>₹ {{ exp.amount }}</td>
                <td>
                    <a href="/edit-expense/{{ exp.id }}" class="edit-btn">Edit</a>
                    <a href="/delete-expense/{{ exp.id }}" class="delete-btn">Delete</a>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
